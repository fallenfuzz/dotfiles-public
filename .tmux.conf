# ~/.tmux.conf

# Support true color (Ghostty)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"

# Pass through special keys (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Clickable OSC 8 hyperlinks (Ghostty passthrough)
set -g allow-passthrough on

# Enable mouse support
set -g mouse on

# Set prefix to Ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one closes
set -g renumber-windows on

# Disable auto window rename
set-option -g allow-rename off

# Neovim: no escape delay + focus events
set -sg escape-time 0
set -g focus-events on

# Bigger scrollback
set -g history-limit 50000

# Intuitive splits (preserve current path)
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window switching (no prefix) — M-, conflicts with aerospace, use M-p instead
bind -n M-. next-window
bind -n M-p previous-window

# Swap windows
bind -T prefix < swap-window -t :-1
bind -T prefix > swap-window -t :+1

# Vi copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Aesthetics: Catppuccin Mocha ──────────────────────────────────────────────
# Palette:
#   base    #1e1e2e   surface0 #313244   overlay1 #7f849c
#   green   #a6e3a1   text     #cdd6f4   subtext0 #a6adc8

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#a6e3a1"

# Dim inactive panes
set -g window-style "fg=#a6adc8"
set -g window-active-style "fg=#cdd6f4"

# Status bar
set -g status-position top
set -g status-style "bg=#1e1e2e"
set -g status-left-length 40
set -g status-right-length 60

# Left: session name with powerline arrow
set -g status-left "#[bg=#a6e3a1,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#a6e3a1]"

# Right: time and date
set -g status-right "#[fg=#7f849c]  #{b:pane_current_path} #[fg=#585b70]│#[fg=#7f849c]  %H:%M #[fg=#585b70]│#[fg=#7f849c] %d %b "

# Window tabs — pill shape with powerline arrows (requires Nerd Font)
set -g window-status-current-format "#[fg=#313244,bg=#1e1e2e]#[fg=#a6e3a1,bg=#313244,bold] #I:#W #[fg=#313244,bg=#1e1e2e]"
set -g window-status-format "#[fg=#585b70,bg=#1e1e2e] #I:#W "
set -g window-status-separator ""

# Copy mode highlight
set -g mode-style "bg=#a6e3a1,fg=#1e1e2e"

# Command/message bar
set -g message-style "bg=#313244,fg=#cdd6f4"
