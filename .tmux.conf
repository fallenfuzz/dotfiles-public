# ~/.tmux.conf

# Support true color (Ghostty)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"

# Pass through special keys (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Clickable OSC 8 hyperlinks (Ghostty passthrough)
set -g allow-passthrough on

# Enable mouse support
set -g mouse on

# Set prefix to Ctrl-a (optional, common preference)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Window switching (no prefix)
bind -n M-. next-window
bind -n M-, previous-window

# Status bar styling (minimal)
set -g status-position top
set -g status-style bg=default
set -g status-fg white
